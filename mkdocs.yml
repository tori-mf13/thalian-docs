site_name: Thalian Docs
site_url: https://docs.thalian.ai

theme:
  name: material
  palette:
    scheme: slate
  font: false
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - navigation.instant

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - assets/nav-links.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Integrations: integrations-guide.md
  - Integration Guides:
    - integrations/index.md
    - Okta: integrations/okta.md
    - Microsoft Entra ID: integrations/microsoft-entra-id.md
    - Google Workspace: integrations/google-workspace.md
    - JumpCloud: integrations/jumpcloud.md
    - OneLogin: integrations/onelogin.md
    - Microsoft Intune: integrations/microsoft-intune.md
    - Jamf Pro: integrations/jamf-pro.md
    - Iru (formerly Kandji): integrations/kandji.md
    - Hexnode: integrations/hexnode.md
    - CrowdStrike: integrations/crowdstrike.md
    - SentinelOne: integrations/sentinelone.md
    - Cisco Meraki: integrations/cisco-meraki.md
    - Auvik: integrations/auvik.md
    - Jira: integrations/jira.md
    - ServiceNow: integrations/servicenow.md
    - Freshservice: integrations/freshservice.md
    - Zendesk: integrations/zendesk.md
    - Slack: integrations/slack.md
    - Microsoft Teams: integrations/microsoft-teams.md
    - Microsoft Outlook: integrations/microsoft-outlook.md
    - SharePoint: integrations/sharepoint.md
    - Confluence: integrations/confluence.md
    - Webhooks: integrations/webhooks.md
  - Findings & Remediation: findings-and-remediation.md
  - Reports & Audit: reports-and-audit.md
  - Settings & Admin: settings-and-admin.md
  - Policies & Impact Analysis: policies-and-planning.md
  - API Reference: api-reference.md
  - Changelog: changelog.md
  - Information Security Policy: information-security-policy.md
  - Terms of Service: terms-of-service.md
  - Privacy Policy: privacy-policy.md
  - Acceptable Use Policy: acceptable-use-policy.md
  - Data Processing Agreement: data-processing-agreement.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

copyright: "&copy; 2026 Thalian, LLC &nbsp;·&nbsp; <a href='/terms-of-service/'>Terms</a> &nbsp;·&nbsp; <a href='/privacy-policy/'>Privacy</a> &nbsp;·&nbsp; <a href='/acceptable-use-policy/'>Acceptable Use</a> &nbsp;·&nbsp; <a href='/data-processing-agreement/'>DPA</a>"
